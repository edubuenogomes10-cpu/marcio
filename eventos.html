<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Eventos | Márcio Garcia</title>
    <meta name="description" content="Galeria de eventos e coberturas fotográficas de Márcio Garcia.">
    <link rel="icon" href="imagens/Logo.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="style.css">
</head>
<body class="gallery-page">
    <main class="gallery-shell">
        <section class="gallery-header">
            <div>
                <a href="index.html#portfolio" class="back-link">Voltar ao site</a>
                <h1>Eventos com ritmo, leitura e acabamento elegante.</h1>
                <p>Imagens pensadas para registrar o contexto, os protagonistas e a energia do momento com consistência visual.</p>
            </div>

            <div class="gallery-side">
                <p>Cobertura ideal para ocasiões que precisam de presença, discrição e entrega refinada em cada registro.</p>
                <a href="https://wa.me/555397114111?text=Ol%C3%A1%20M%C3%A1rcio!%20Vi%20a%20galeria%20de%20eventos%20e%20quero%20consultar%20uma%20data." target="_blank" rel="noreferrer" class="gallery-cta">Consultar evento</a>
            </div>
        </section>

        <section class="gallery-grid" aria-label="Galeria de eventos">
            <figure class="gallery-item photo-card">
                <img src="imagens/eventos 1.jpg" alt="Cobertura fotográfica de celebração especial">
            </figure>
            <figure class="gallery-item photo-card">
                <img src="imagens/eventos 2.jpg" alt="Participantes reunidos em evento">
            </figure>
            <figure class="gallery-item photo-card">
                <img src="imagens/eventos.jpg" alt="Registro documental de evento">
            </figure>
            <figure class="gallery-item photo-card">
                <img src="imagens/eventos.png" alt="Cena ampla de evento com convidados">
            </figure>
        </section>
    </main>
</body>
</html>
